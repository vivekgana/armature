# Armature config for a Python FastAPI project
# Generated by: armature init

project:
  name: "my-fastapi-app"
  language: python
  framework: fastapi
  src_dir: "app/"
  test_dir: "tests/"

budget:
  enabled: true
  defaults:
    low:          { max_tokens: 250000,   max_cost_usd: 5.00 }
    medium:       { max_tokens: 1250000,  max_cost_usd: 25.00 }
    high:         { max_tokens: 2500000,  max_cost_usd: 50.00 }
    critical:     { max_tokens: 5000000,  max_cost_usd: 100.00 }
  providers:
    strategy: cost_optimized
    default_model: claude-sonnet
    enabled_models: [claude-sonnet, claude-haiku, claude-opus]
    quality_floor: 0.75
    premium_intents: [complex_code_gen, architecture]
  cache:
    enabled: true
    storage: ".armature/cache/"
    max_size_mb: 200
    ttl_days: 14
  calibration:
    enabled: true
    auto_calibrate: true
    min_specs: 3

quality:
  enabled: true
  gates:
    draft: 0.70
    review_ready: 0.85
    merge_ready: 0.95
  checks:
    lint:
      tool: ruff
      args: ["check", "--statistics"]
      weight: 25
    type_check:
      tool: mypy
      args: ["--no-error-summary"]
      weight: 25
    test:
      tool: pytest
      args: ["-x", "--tb=short"]
      weight: 20
      coverage_min: 85
  post_write:
    enabled: true
    tools: [lint, type_check]

architecture:
  enabled: true
  layers:
    - name: models
      dirs: ["app/models/"]
    - name: services
      dirs: ["app/services/"]
    - name: routes
      dirs: ["app/routes/", "app/api/"]
  boundaries:
    - from: models
      to: [routes]
    - from: services
      to: [routes]
  allowed_shared:
    - "app/config/"
    - "app/utils/"
    - "app/errors/"

heal:
  enabled: true
  max_attempts: 3
  healers:
    lint:
      enabled: true
      auto_fix: true
    type_check:
      enabled: true
      auto_fix: false
    test:
      enabled: true
      auto_fix: false

specs:
  enabled: true
  dir: "specs/"
  templates_dir: "specs/templates/"
  id_pattern: "^SPEC-\\d{4}-Q[1-4]-\\d{3}$"
  required_fields: [spec_id, title, type, description, acceptance_criteria]
  traceability:
    enabled: true
    pattern: "(SPEC-\\d{4}-Q\\d-\\d{3})\\s*/\\s*(AC-\\d+)"

integrations:
  claude_code:
    enabled: true
    post_tool_use: true
    pre_session: true
