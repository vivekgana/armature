# Armature config for a monorepo with multiple services

project:
  name: "my-monorepo"
  language: python
  src_dir: "services/"
  test_dir: "tests/"

budget:
  enabled: true
  defaults:
    low:          { max_tokens: 250000,   max_cost_usd: 5.00 }
    medium:       { max_tokens: 1250000,  max_cost_usd: 25.00 }
    high:         { max_tokens: 2500000,  max_cost_usd: 50.00 }
    critical:     { max_tokens: 5000000,  max_cost_usd: 100.00 }
  providers:
    strategy: cost_optimized
    default_model: claude-sonnet
    enabled_models: [claude-sonnet, claude-haiku, claude-opus, sonar-pro]
    quality_floor: 0.75
    premium_intents: [complex_code_gen, architecture, research]
  cache:
    enabled: true
    storage: ".armature/cache/"
    max_size_mb: 200
    ttl_days: 14
  calibration:
    enabled: true
    auto_calibrate: true
    min_specs: 3
  monitoring:
    track_provider: true
    track_latency: true
    track_cache_hits: true
    anomaly_threshold: 2.5

quality:
  enabled: true
  checks:
    lint: { tool: ruff, weight: 25 }
    type_check: { tool: mypy, weight: 25 }
    test: { tool: pytest, weight: 20, coverage_min: 80 }
  post_write:
    enabled: true

architecture:
  enabled: true
  layers:
    - name: shared
      dirs: ["packages/shared/"]
    - name: api
      dirs: ["services/api/"]
    - name: worker
      dirs: ["services/worker/"]
    - name: frontend
      dirs: ["apps/web/"]
  boundaries:
    - from: shared
      to: [api, worker, frontend]
    - from: api
      to: [frontend]
    - from: worker
      to: [frontend]
  allowed_shared:
    - "packages/shared/"

gc:
  enabled: true
  agents:
    architecture: { enabled: true, cadence: daily }
    docs: { enabled: true, cadence: weekly, watched_files: ["README.md", "docs/*.md"] }
    dead_code: { enabled: true, cadence: weekly }

heal:
  enabled: true
  healers:
    lint: { auto_fix: true }

specs:
  enabled: true
  dir: "specs/"
  templates_dir: "specs/templates/"
  id_pattern: "^SPEC-\\d{4}-Q[1-4]-\\d{3}$"
  required_fields: [spec_id, title, type, description, acceptance_criteria]
  traceability:
    enabled: true
    pattern: "(SPEC-\\d{4}-Q\\d-\\d{3})\\s*/\\s*(AC-\\d+)"

integrations:
  claude_code: { enabled: true }
  github_actions: { enabled: true }
