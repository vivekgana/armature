# 5 categories × 10 tasks each.
# Each task defines a coding challenge for AI agent evaluation.
#
# Fields:
#   id: unique task identifier
#   category: bugfix | feature | refactor | test_gen | documentation
#   description: what the agent must do
#   difficulty: easy | medium | hard
#   language: python | typescript | go | rust
#   estimated_tokens: expected token consumption
#   verification: command to verify correctness
#   files_touched: expected number of files changed

