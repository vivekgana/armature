<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1050" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="50%" style="stop-color:#161b22"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="100%" style="stop-color:#bc8cff"/>
    </linearGradient>
    <linearGradient id="flowGreen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#238636"/>
      <stop offset="100%" style="stop-color:#2ea043"/>
    </linearGradient>
    <linearGradient id="flowBlue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1f6feb"/>
      <stop offset="100%" style="stop-color:#388bfd"/>
    </linearGradient>
    <linearGradient id="flowPurple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#bc8cff"/>
    </linearGradient>
    <linearGradient id="flowOrange" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d29922"/>
      <stop offset="100%" style="stop-color:#f0883e"/>
    </linearGradient>
    <linearGradient id="flowRed" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#da3633"/>
      <stop offset="100%" style="stop-color:#f85149"/>
    </linearGradient>
    <linearGradient id="flowTeal" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a7f37"/>
      <stop offset="100%" style="stop-color:#2ea043"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="rgba(88,166,255,0.04)" stroke-width="0.5"/>
    </pattern>
    <marker id="arrowGray" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#484f58"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3fb950"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#58a6ff"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f85149"/>
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f0883e"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="1050" fill="url(#bg)"/>
  <rect width="1200" height="1050" fill="url(#grid)"/>
  <rect x="0" y="0" width="1200" height="3" fill="url(#accent)"/>

  <!-- Title -->
  <text x="600" y="48" text-anchor="middle" fill="#e6edf3" font-size="28" font-weight="700" letter-spacing="2">ARMATURE</text>
  <text x="600" y="72" text-anchor="middle" fill="#8b949e" font-size="14" letter-spacing="4">USAGE FLOW &amp; DEVELOPMENT LIFECYCLE</text>
  <line x1="430" y1="82" x2="770" y2="82" stroke="url(#accent)" stroke-width="1.5" opacity="0.5"/>

  <!-- ========== SECTION 1: Installation & Setup ========== -->
  <text x="600" y="112" text-anchor="middle" fill="#3fb950" font-size="12" font-weight="600" letter-spacing="2">STEP 1 — INSTALL &amp; INITIALIZE</text>

  <g filter="url(#shadow)">
    <rect x="80" y="124" width="300" height="80" rx="10" fill="#21262d" stroke="#2ea043" stroke-width="1.5"/>
    <text x="100" y="150" fill="#3fb950" font-size="12" font-weight="600">$ pip install armature-harness</text>
    <text x="100" y="172" fill="#8b949e" font-size="11">Install from PyPI with optional tools:</text>
    <text x="100" y="190" fill="#484f58" font-size="10">pip install armature-harness[python]</text>
  </g>

  <line x1="380" y1="164" x2="430" y2="164" stroke="#484f58" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <g filter="url(#shadow)">
    <rect x="440" y="124" width="300" height="80" rx="10" fill="#21262d" stroke="#2ea043" stroke-width="1.5"/>
    <text x="460" y="150" fill="#3fb950" font-size="12" font-weight="600">$ armature init</text>
    <text x="460" y="172" fill="#8b949e" font-size="11">Creates armature.yaml with project</text>
    <text x="460" y="190" fill="#8b949e" font-size="11">settings, quality checks, budget tiers</text>
  </g>

  <line x1="740" y1="164" x2="790" y2="164" stroke="#484f58" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <g filter="url(#shadow)">
    <rect x="800" y="124" width="300" height="80" rx="10" fill="#21262d" stroke="#2ea043" stroke-width="1.5"/>
    <text x="820" y="150" fill="#3fb950" font-size="12" font-weight="600">$ armature hooks --claude-code</text>
    <text x="820" y="172" fill="#8b949e" font-size="11">Wire into your IDE: Claude Code,</text>
    <text x="820" y="190" fill="#8b949e" font-size="11">Cursor, Copilot, GitHub Actions</text>
  </g>

  <!-- ========== SECTION 2: Development Flow ========== -->
  <text x="600" y="240" text-anchor="middle" fill="#58a6ff" font-size="12" font-weight="600" letter-spacing="2">STEP 2 — SPEC-DRIVEN DEVELOPMENT LOOP</text>

  <!-- Write Spec -->
  <g filter="url(#shadow)">
    <rect x="60" y="260" width="190" height="65" rx="10" fill="#21262d" stroke="#f0883e" stroke-width="1.5"/>
    <text x="155" y="285" text-anchor="middle" fill="#f0883e" font-size="16">&#x1F4DD;</text>
    <text x="155" y="305" text-anchor="middle" fill="#e6edf3" font-size="12" font-weight="600">Write Spec (YAML)</text>
    <text x="155" y="318" text-anchor="middle" fill="#484f58" font-size="9">SPEC-2026-Q2-001</text>
  </g>

  <line x1="250" y1="292" x2="290" y2="292" stroke="#f0883e" stroke-width="1.5" marker-end="url(#arrowOrange)"/>

  <!-- Pre-Dev -->
  <g filter="url(#shadow)">
    <rect x="300" y="260" width="190" height="65" rx="10" fill="#21262d" stroke="#388bfd" stroke-width="1.5"/>
    <text x="395" y="285" text-anchor="middle" fill="#58a6ff" font-size="16">&#x1F50D;</text>
    <text x="395" y="305" text-anchor="middle" fill="#e6edf3" font-size="12" font-weight="600">armature pre-dev</text>
    <text x="395" y="318" text-anchor="middle" fill="#484f58" font-size="9">Capture baseline snapshot</text>
  </g>

  <line x1="490" y1="292" x2="530" y2="292" stroke="#388bfd" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- Agent Develops -->
  <g filter="url(#shadow)">
    <rect x="540" y="252" width="220" height="80" rx="10" fill="#21262d" stroke="#bc8cff" stroke-width="2"/>
    <text x="650" y="278" text-anchor="middle" fill="#bc8cff" font-size="18">&#x1F916;</text>
    <text x="650" y="298" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="700">AI Agent Develops</text>
    <text x="650" y="314" text-anchor="middle" fill="#8b949e" font-size="10">Claude Code / Cursor / Copilot</text>
    <text x="650" y="327" text-anchor="middle" fill="#484f58" font-size="9">Guided by armature.yaml rules</text>
  </g>

  <line x1="760" y1="292" x2="800" y2="292" stroke="#bc8cff" stroke-width="1.5"/>

  <!-- Post-Write Hook -->
  <g filter="url(#shadow)">
    <rect x="810" y="260" width="190" height="65" rx="10" fill="#21262d" stroke="#3fb950" stroke-width="1.5"/>
    <text x="905" y="285" text-anchor="middle" fill="#3fb950" font-size="16">&#x26A1;</text>
    <text x="905" y="305" text-anchor="middle" fill="#e6edf3" font-size="12" font-weight="600">Post-Write Hook</text>
    <text x="905" y="318" text-anchor="middle" fill="#484f58" font-size="9">Shift-left: lint + type on save</text>
  </g>

  <!-- Loop arrow back from Post-Write to Agent -->
  <path d="M 905 325 L 905 345 L 650 345 L 650 332" fill="none" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arrowGreen)" stroke-dasharray="4,3"/>
  <text x="780" y="358" text-anchor="middle" fill="#3fb950" font-size="9">Fix &amp; continue</text>

  <!-- ========== SECTION 3: Quality Gate ========== -->
  <text x="600" y="396" text-anchor="middle" fill="#bc8cff" font-size="12" font-weight="600" letter-spacing="2">STEP 3 — QUALITY GATE (8 WEIGHTED CHECKS)</text>

  <!-- Quality Checks Row -->
  <g filter="url(#shadow)">
    <rect x="40" y="410" width="1120" height="115" rx="12" fill="#1c2128" stroke="#388bfd" stroke-width="1"/>

    <!-- Check 1: Lint -->
    <rect x="55" y="422" width="120" height="55" rx="8" fill="#21262d" stroke="#30363d"/>
    <text x="115" y="443" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="600">Lint (ruff)</text>
    <text x="115" y="462" text-anchor="middle" fill="#484f58" font-size="10">W: 25</text>

    <!-- Check 2: Type -->
    <rect x="185" y="422" width="120" height="55" rx="8" fill="#21262d" stroke="#30363d"/>
    <text x="245" y="443" text-anchor="middle" fill="#58a6ff" font-size="11" font-weight="600">Type (mypy)</text>
    <text x="245" y="462" text-anchor="middle" fill="#484f58" font-size="10">W: 25</text>

    <!-- Check 3: Test -->
    <rect x="315" y="422" width="120" height="55" rx="8" fill="#21262d" stroke="#30363d"/>
    <text x="375" y="443" text-anchor="middle" fill="#bc8cff" font-size="11" font-weight="600">Test (pytest)</text>
    <text x="375" y="462" text-anchor="middle" fill="#484f58" font-size="10">W: 20</text>

    <!-- Check 4: Security -->
    <rect x="445" y="422" width="120" height="55" rx="8" fill="#21262d" stroke="#30363d"/>
    <text x="505" y="443" text-anchor="middle" fill="#f85149" font-size="11" font-weight="600">Security (bandit)</text>
    <text x="505" y="462" text-anchor="middle" fill="#484f58" font-size="10">W: 20</text>

    <!-- Check 5: Complexity -->
    <rect x="575" y="422" width="120" height="55" rx="8" fill="#21262d" stroke="#30363d"/>
    <text x="635" y="443" text-anchor="middle" fill="#f0883e" font-size="11" font-weight="600">Complexity</text>
    <text x="635" y="462" text-anchor="middle" fill="#484f58" font-size="10">W: 15</text>

    <!-- Check 6: Deps -->
    <rect x="705" y="422" width="120" height="55" rx="8" fill="#21262d" stroke="#30363d"/>
    <text x="765" y="443" text-anchor="middle" fill="#d29922" font-size="11" font-weight="600">Dep Audit</text>
    <text x="765" y="462" text-anchor="middle" fill="#484f58" font-size="10">W: 15</text>

    <!-- Check 7: Docstring -->
    <rect x="835" y="422" width="120" height="55" rx="8" fill="#21262d" stroke="#30363d"/>
    <text x="895" y="443" text-anchor="middle" fill="#8b949e" font-size="11" font-weight="600">Docstring</text>
    <text x="895" y="462" text-anchor="middle" fill="#484f58" font-size="10">W: 10</text>

    <!-- Check 8: Test Ratio -->
    <rect x="965" y="422" width="120" height="55" rx="8" fill="#21262d" stroke="#30363d"/>
    <text x="1025" y="443" text-anchor="middle" fill="#8b949e" font-size="11" font-weight="600">Test Ratio</text>
    <text x="1025" y="462" text-anchor="middle" fill="#484f58" font-size="10">W: 10</text>

    <!-- Scoring formula -->
    <text x="600" y="510" text-anchor="middle" fill="#58a6ff" font-size="11" font-weight="600">Weighted Score = &#x2211;(score &#xD7; weight) / &#x2211;(weight)</text>
  </g>

  <!-- Quality Gates -->
  <g filter="url(#shadow)">
    <rect x="200" y="535" width="190" height="40" rx="8" fill="#21262d" stroke="#f0883e" stroke-width="1.5"/>
    <text x="295" y="558" text-anchor="middle" fill="#f0883e" font-size="11" font-weight="600">&#x1F7E1; Draft: 70%</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="420" y="535" width="190" height="40" rx="8" fill="#21262d" stroke="#58a6ff" stroke-width="1.5"/>
    <text x="515" y="558" text-anchor="middle" fill="#58a6ff" font-size="11" font-weight="600">&#x1F535; Review Ready: 85%</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="640" y="535" width="190" height="40" rx="8" fill="#21262d" stroke="#3fb950" stroke-width="1.5"/>
    <text x="735" y="558" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="600">&#x1F7E2; Merge Ready: 95%</text>
  </g>

  <!-- ========== SECTION 4: Post-Dev & Reports ========== -->
  <text x="600" y="610" text-anchor="middle" fill="#f0883e" font-size="12" font-weight="600" letter-spacing="2">STEP 4 — POST-DEV ANALYSIS &amp; REPORTS</text>

  <g filter="url(#shadow)">
    <rect x="60" y="624" width="250" height="70" rx="10" fill="#21262d" stroke="#388bfd" stroke-width="1.5"/>
    <text x="185" y="650" text-anchor="middle" fill="#58a6ff" font-size="12" font-weight="600">&#x1F4CA; armature post-dev</text>
    <text x="185" y="668" text-anchor="middle" fill="#8b949e" font-size="10">Regression check vs baseline</text>
    <text x="185" y="682" text-anchor="middle" fill="#484f58" font-size="9">Complexity, security, vuln deltas</text>
  </g>

  <line x1="310" y1="660" x2="350" y2="660" stroke="#484f58" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <g filter="url(#shadow)">
    <rect x="360" y="624" width="250" height="70" rx="10" fill="#21262d" stroke="#2ea043" stroke-width="1.5"/>
    <text x="485" y="650" text-anchor="middle" fill="#3fb950" font-size="12" font-weight="600">&#x1F4B0; Budget Report</text>
    <text x="485" y="668" text-anchor="middle" fill="#8b949e" font-size="10">Token/cost per spec, per phase</text>
    <text x="485" y="682" text-anchor="middle" fill="#484f58" font-size="9">Optimization suggestions</text>
  </g>

  <line x1="610" y1="660" x2="650" y2="660" stroke="#484f58" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <g filter="url(#shadow)">
    <rect x="660" y="624" width="250" height="70" rx="10" fill="#21262d" stroke="#f85149" stroke-width="1.5"/>
    <text x="785" y="650" text-anchor="middle" fill="#f85149" font-size="12" font-weight="600">&#x1F9F9; GC Sweep</text>
    <text x="785" y="668" text-anchor="middle" fill="#8b949e" font-size="10">Drift, dead code, stale docs</text>
    <text x="785" y="682" text-anchor="middle" fill="#484f58" font-size="9">armature gc --all</text>
  </g>

  <!-- ========== SECTION 5: Self-Heal ========== -->
  <text x="600" y="730" text-anchor="middle" fill="#f85149" font-size="12" font-weight="600" letter-spacing="2">STEP 5 — SELF-HEALING PIPELINE</text>

  <g filter="url(#shadow)">
    <rect x="120" y="744" width="960" height="80" rx="12" fill="#1c2128" stroke="#da3633" stroke-width="1" stroke-dasharray="4,3"/>

    <!-- Attempt 1 -->
    <rect x="145" y="756" width="180" height="52" rx="8" fill="#21262d" stroke="#30363d"/>
    <text x="235" y="777" text-anchor="middle" fill="#f85149" font-size="11" font-weight="600">&#x1F527; Attempt 1</text>
    <text x="235" y="795" text-anchor="middle" fill="#8b949e" font-size="10">Auto-fix lint (ruff --fix)</text>

    <line x1="325" y1="782" x2="365" y2="782" stroke="#484f58" stroke-width="1" marker-end="url(#arrowGray)"/>

    <!-- Attempt 2 -->
    <rect x="375" y="756" width="180" height="52" rx="8" fill="#21262d" stroke="#30363d"/>
    <text x="465" y="777" text-anchor="middle" fill="#f0883e" font-size="11" font-weight="600">&#x1F527; Attempt 2</text>
    <text x="465" y="795" text-anchor="middle" fill="#8b949e" font-size="10">Re-run checks, try fix</text>

    <line x1="555" y1="782" x2="595" y2="782" stroke="#484f58" stroke-width="1" marker-end="url(#arrowGray)"/>

    <!-- Attempt 3 -->
    <rect x="605" y="756" width="180" height="52" rx="8" fill="#21262d" stroke="#30363d"/>
    <text x="695" y="777" text-anchor="middle" fill="#d29922" font-size="11" font-weight="600">&#x1F527; Attempt 3</text>
    <text x="695" y="795" text-anchor="middle" fill="#8b949e" font-size="10">Final attempt</text>

    <line x1="785" y1="782" x2="825" y2="782" stroke="#484f58" stroke-width="1" marker-end="url(#arrowGray)"/>

    <!-- Circuit Breaker -->
    <rect x="835" y="756" width="220" height="52" rx="8" fill="rgba(218,54,51,0.15)" stroke="#da3633"/>
    <text x="945" y="777" text-anchor="middle" fill="#f85149" font-size="11" font-weight="600">&#x26D4; Circuit Breaker</text>
    <text x="945" y="795" text-anchor="middle" fill="#8b949e" font-size="10">Escalate to human</text>
  </g>

  <!-- ========== SECTION 6: Human Gate ========== -->
  <text x="600" y="860" text-anchor="middle" fill="#3fb950" font-size="12" font-weight="600" letter-spacing="2">STEP 6 — HUMAN GATE &amp; MERGE</text>

  <g filter="url(#shadow)">
    <rect x="220" y="875" width="210" height="55" rx="10" fill="#21262d" stroke="#f0883e" stroke-width="1.5"/>
    <text x="325" y="900" text-anchor="middle" fill="#f0883e" font-size="14">&#x1F9D1;</text>
    <text x="325" y="918" text-anchor="middle" fill="#e6edf3" font-size="12" font-weight="600">Human Review</text>
  </g>

  <line x1="430" y1="902" x2="470" y2="878" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <line x1="430" y1="902" x2="470" y2="928" stroke="#f85149" stroke-width="1.5" marker-end="url(#arrowRed)"/>

  <g filter="url(#shadow)">
    <rect x="480" y="860" width="200" height="40" rx="10" fill="rgba(46,160,67,0.2)" stroke="#2ea043" stroke-width="1.5"/>
    <text x="580" y="885" text-anchor="middle" fill="#3fb950" font-size="12" font-weight="700">&#x2705; Approved &#x2192; Merge</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="480" y="912" width="200" height="40" rx="10" fill="rgba(218,54,51,0.15)" stroke="#da3633" stroke-width="1.5"/>
    <text x="580" y="937" text-anchor="middle" fill="#f85149" font-size="12" font-weight="600">&#x274C; Rejected &#x2192; Rework</text>
  </g>

  <!-- Rework arrow looping back -->
  <path d="M 680 932 L 740 932 L 740 292 L 760 292" fill="none" stroke="#f85149" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="754" y="612" text-anchor="middle" fill="#f85149" font-size="9" transform="rotate(-90, 754, 612)">Back to development</text>

  <!-- ========== Footer ========== -->
  <rect x="0" y="975" width="1200" height="75" fill="rgba(0,0,0,0.3)"/>
  <line x1="0" y1="975" x2="1200" y2="975" stroke="#30363d" stroke-width="1"/>
  <text x="600" y="1002" text-anchor="middle" fill="#58a6ff" font-size="14" font-weight="600">github.com/vivekgana/armature</text>
  <text x="600" y="1025" text-anchor="middle" fill="#484f58" font-size="11">pip install armature-harness  |  Open Source (MIT)  |  v0.2.2  |  55+ metrics across 6 pillars</text>

  <rect x="0" y="1047" width="1200" height="3" fill="url(#accent)"/>
</svg>
