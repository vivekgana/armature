# Armature config for a TypeScript Next.js project

project:
  name: "my-nextjs-app"
  language: typescript
  framework: nextjs
  src_dir: "src/"
  test_dir: "__tests__/"

budget:
  enabled: true
  defaults:
    low:      { max_tokens: 100000,  max_cost_usd: 2.00 }
    medium:   { max_tokens: 500000,  max_cost_usd: 10.00 }
    high:     { max_tokens: 1000000, max_cost_usd: 20.00 }
    critical: { max_tokens: 2000000, max_cost_usd: 40.00 }

quality:
  enabled: true
  gates:
    draft: 0.70
    review_ready: 0.85
    merge_ready: 0.95
  checks:
    lint:
      tool: eslint
      args: ["--ext", ".ts,.tsx"]
      weight: 25
    type_check:
      tool: tsc
      args: ["--noEmit"]
      weight: 25
    test:
      tool: jest
      args: ["--passWithNoTests"]
      weight: 20
      coverage_min: 80
  post_write:
    enabled: true
    tools: [lint, type_check]

architecture:
  enabled: true
  layers:
    - name: lib
      dirs: ["src/lib/"]
    - name: server
      dirs: ["src/app/api/"]
    - name: components
      dirs: ["src/components/"]
  boundaries:
    - from: lib
      to: [components]
  allowed_shared:
    - "src/utils/"
    - "src/types/"

heal:
  enabled: true
  healers:
    lint:
      enabled: true
      auto_fix: true

specs:
  enabled: true
  dir: "specs/"
  templates_dir: "specs/templates/"
  id_pattern: "^SPEC-\\d{4}-Q[1-4]-\\d{3}$"
  required_fields: [spec_id, title, type, description, acceptance_criteria]
  traceability:
    enabled: true
    pattern: "(SPEC-\\d{4}-Q\\d-\\d{3})\\s*/\\s*(AC-\\d+)"

integrations:
  cursor:
    enabled: true
  github_actions:
    enabled: true
