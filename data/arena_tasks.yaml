# Agent configurations for arena comparison
agents:
  claude-code:
    model: claude-sonnet-4
    provider: anthropic
    description: "Claude Code CLI with hooks + MCP"
  cursor:
    model: claude-sonnet-4
    provider: anthropic
    description: "Cursor IDE with .cursor/rules + MCP"
  copilot:
    model: gpt-4o
    provider: openai
    description: "GitHub Copilot with instructions file"
  windsurf:
    model: mixed
    provider: mixed
    description: "Windsurf IDE with rules file"
  amazon-q:
    model: titan-plus-claude
    provider: aws
    description: "Amazon Q Developer"

# Composite scoring weights
scoring:
  quality_weight: 0.40
  efficiency_weight: 0.25
  heal_weight: 0.20
  cache_weight: 0.15

# Grade boundaries
grades:
  A: 90
  B+: 85
  B: 80
  B-: 75
  C: 65
  D: 0
